repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        include: \.(yaml|yml)$

  - repo: https://github.com/pycqa/pylint
    rev: v3.0.0a5
    hooks:
      - id: pylint
        files: \.py$